<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JB-26-000-GIT</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 520px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.6rem;
      color: #58a6ff;
      margin: 0 0 0.25rem;
    }
    .subtitle {
      color: #8b949e;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-block;
      background: #1f6feb;
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    td {
      padding: 0.45rem 0;
      border-bottom: 1px solid #21262d;
    }
    td:first-child {
      color: #8b949e;
      width: 38%;
    }
    td:last-child {
      color: #e6edf3;
    }
    .tools {
      margin-top: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .tool-tag {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>JB-26-000-GIT</h1>
    <div class="subtitle">Git Learning &amp; Tool Setup</div>
    <span class="badge">Active</span>
    <table>
      <tr><td>Short Code</td><td>GIT</td></tr>
      <tr><td>Started</td><td>2026-04-08</td></tr>
      <tr><td>Numbering</td><td>JB-YY-NNN-XXX</td></tr>
      <tr><td>Description</td><td>First repository for learning Git, VS Code, Replit, and Claude Code.</td></tr>
    </table>
    <div class="tools">
      <span class="tool-tag">Git Bash</span>
      <span class="tool-tag">VS Code</span>
      <span class="tool-tag">Replit</span>
      <span class="tool-tag">Claude Code</span>
    </div>
  </div>
</body>
</html>
